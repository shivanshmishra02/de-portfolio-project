version: 2

models:
  - name: dim_company
    description: "Company level dimensions."
    columns:
      - name: company_key
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: company_name
        description: "Company name"
        tests:
          - not_null

  - name: dim_locations
    description: "Geography dimension for the jobs."
    columns:
      - name: location_key
        description: "Primary key"
        tests:
          - unique
          - not_null

  - name: dim_role
    description: "Title, seniority, and abstraction classifications."
    columns:
      - name: role_id
        description: "Primary key"
        tests:
          - unique
          - not_null

  - name: dim_skill
    description: "Canonical skills dimension."
    columns:
      - name: skill_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: skill_name
        tests:
          - unique
          - not_null

  - name: dim_job
    description: "Job dimension with SCD Type 2 active flag."
    columns:
      - name: job_key
        description: "Primary key"
        tests:
          - unique
          - not_null

  - name: dim_date
    columns:
      - name: date_key
        description: "Primary key"
        tests:
          - unique
          - not_null

  - name: fact_job_postings
    description: "Central fact table matching salary/experience ranges to standard dimensions."
    columns:
      - name: job_id
        description: "Grain of the table (matches Bronze API IDs)"
        tests:
          - unique
          - not_null

  - name: fact_job_skills
    description: "Link table for jobs and skills."
    columns:
      - name: job_skill_key
        tests:
          - unique
          - not_null
